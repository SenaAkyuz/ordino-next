<!DOCTYPE html>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ordino Sunum</title>
<meta name="robots" content="index,follow">
<link rel="canonical" href="https://theordino.com/sunum">
<meta property="og:title" content="Ordino Sunum">
<meta property="og:type" content="website">
<meta property="og:url" content="https://theordino.com/sunum">
<style>
  :root {
    --bg: #000;
    --fg: #f5f5f5;
    --muted: #9a9a9a;
    --accent: #d4a956;
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  header {
    text-align: center;
    padding: 28px 16px;
    background: #fff;
  }
  header .logo {
    display: inline-block;
    height: 36px;
    width: auto;
    vertical-align: middle;
  }
  .deck {
    display: flex;
    flex-direction: column;
    align-items: stretch;
    gap: 0;
    padding: 0;
  }
  .slide {
    width: 100%;
    max-width: none;
    background: #000;
    border-radius: 0;
    overflow: hidden;
    position: relative;
  }
  .slide img,
  .slide video {
    display: block;
    width: 100%;
    height: auto;
    image-rendering: -webkit-optimize-contrast;
    image-rendering: crisp-edges;
  }
</style>
</head>
