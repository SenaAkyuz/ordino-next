<script>
  // Akilli lazy load: video gorunume yaklasinca yukle, gorununce oynat, kaybolunca duraklat
  (function() {
    const lazyVideos = document.querySelectorAll('video[data-src]');

    // Eski tarayici fallback
    if (!('IntersectionObserver' in window)) {
      lazyVideos.forEach(v => {
        v.src = v.dataset.src;
        v.play().catch(() => {});
      });
      return;
    }

    // Observer 1: Video viewport'a 400px yaklasinca dosyayi yuklemeye basla
    const loadObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        if (entry.isIntersecting && !entry.target.src) {
          entry.target.src = entry.target.dataset.src;
        }
      });
    }, { rootMargin: '400px 0px' });

    // Observer 2: Video %25 gorununce oynat, kaybolunca duraklat (CPU/pil tasarrufu)
    const playObserver = new IntersectionObserver((entries) => {
      entries.forEach(entry => {
        const video = entry.target;
        if (entry.isIntersecting) {
          video.play().catch(() => {});
        } else {
          video.pause();
        }
      });
    }, { threshold: 0.25 });

    lazyVideos.forEach(v => {
      loadObserver.observe(v);
      playObserver.observe(v);
    });
  })();
</script>
