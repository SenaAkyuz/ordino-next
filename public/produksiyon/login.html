<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AIATA — Özel Erişim</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Inter:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --deep-navy: #1B2738;
    --aegean-teal: #2E5C66;
    --soft-aiata: #7AA0A8;
    --warm-cream: #F4EFE8;
    --teak-gold: #B68A4E;
    --leather-brown: #7A4A2C;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; width: 100%; }

  body {
    background: var(--warm-cream);
    color: var(--deep-navy);
    font-family: 'Inter', sans-serif;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow: hidden;
    position: relative;
  }

  body::before {
    content: "";
    position: fixed;
    inset: 0;
    background-image:
      radial-gradient(ellipse at 18% 28%, rgba(122,160,168,0.10) 0%, transparent 45%),
      radial-gradient(ellipse at 82% 72%, rgba(182,138,78,0.08) 0%, transparent 55%);
    pointer-events: none;
    z-index: 0;
  }

  .frame {
    position: fixed;
    inset: 24px;
    border: 1px solid rgba(27,39,56,0.12);
    pointer-events: none;
    z-index: 1;
  }

  .corner {
    position: fixed;
    font-family: 'Inter', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--deep-navy);
    opacity: 0.55;
    z-index: 2;
  }
  .corner.tl { top: 40px; left: 44px; }
  .corner.tr { top: 40px; right: 44px; }
  .corner.bl { bottom: 40px; left: 44px; }
  .corner.br { bottom: 40px; right: 44px; }

  main {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 80px 24px;
    position: relative;
    z-index: 2;
  }

  .card {
    width: 100%;
    max-width: 420px;
    text-align: center;
    animation: fadeUp 1.1s cubic-bezier(0.2, 0.8, 0.2, 1) both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .eyebrow {
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--aegean-teal);
    margin-bottom: 28px;
  }

  .title {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(44px, 6.5vw, 64px);
    line-height: 1.02;
    letter-spacing: -0.012em;
    color: var(--deep-navy);
    margin-bottom: 14px;
  }
  .title em {
    font-style: italic;
    font-weight: 300;
    color: var(--aegean-teal);
  }

  .subtitle {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 17px;
    color: var(--leather-brown);
    opacity: 0.75;
    margin-bottom: 52px;
  }

  form {
    display: flex;
    flex-direction: column;
    gap: 26px;
    text-align: left;
  }

  .field label {
    display: block;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 0.30em;
    text-transform: uppercase;
    color: var(--deep-navy);
    opacity: 0.6;
    margin-bottom: 10px;
  }

  .field input {
    width: 100%;
    border: none;
    border-bottom: 1px solid rgba(27,39,56,0.25);
    background: transparent;
    padding: 8px 0 12px;
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    color: var(--deep-navy);
    outline: none;
    transition: border-color 0.35s ease;
  }
  .field input:focus { border-bottom-color: var(--teak-gold); }
  .field input::placeholder {
    color: rgba(27,39,56,0.28);
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
  }

  .error {
    min-height: 20px;
    margin-top: -6px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 14px;
    color: var(--leather-brown);
    text-align: center;
    opacity: 0;
    transition: opacity 0.3s ease;
  }
  .error.show { opacity: 1; }

  button {
    margin-top: 12px;
    padding: 16px 24px;
    background: var(--deep-navy);
    color: var(--warm-cream);
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.4s ease, letter-spacing 0.4s ease;
  }
  button:hover {
    background: var(--aegean-teal);
    letter-spacing: 0.40em;
  }
  button:active { transform: translateY(1px); }

  .footer-note {
    margin-top: 64px;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 13px;
    color: var(--leather-brown);
    opacity: 0.55;
  }

  @media (max-width: 600px) {
    .frame { inset: 14px; }
    .corner.tl, .corner.tr { top: 28px; }
    .corner.bl, .corner.br { bottom: 28px; }
    .corner.tl, .corner.bl { left: 28px; }
    .corner.tr, .corner.br { right: 28px; }
    .corner { font-size: 9px; letter-spacing: 0.26em; }
    main { padding: 60px 28px; }
    .card { max-width: 100%; }
  }
</style>
</head>
<body>
  <div class="frame"></div>
  <span class="corner tl">AIATA</span>
  <span class="corner tr">Moodboard · v1</span>
  <span class="corner bl">Çeşme → Bodrum → Göcek</span>
  <span class="corner br">Mayıs 2026</span>

  <main>
    <div class="card">
      <div class="eyebrow">Özel Erişim</div>
      <h1 class="title">quiet luxury<br><em>at sea.</em></h1>
      <p class="subtitle">— davetli için hazırlanmıştır</p>

      <form id="loginForm" autocomplete="off">
        <div class="field">
          <label for="password">Şifre</label>
          <input type="password" id="password" autocomplete="off" placeholder="şifre" required autofocus>
        </div>
        <div class="error" id="error">— erişim reddedildi.</div>
        <button type="submit">Giriş yap</button>
      </form>

      <div class="footer-note">Ordino · 2026</div>
    </div>
  </main>

  <script>
    // ─────────────────────────────────────────────
    //  ŞİFRE — buradan değiştirebilirsin
    // ─────────────────────────────────────────────
    const PASSWORD = "ordino";
    // ─────────────────────────────────────────────

    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('error');
    const passwordEl = document.getElementById('password');

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const p = passwordEl.value;

      if (p === PASSWORD) {
        try { sessionStorage.setItem('aiata_auth', 'granted'); } catch(_) {}
        window.location.href = 'index.html';
      } else {
        errorEl.classList.add('show');
        passwordEl.value = '';
        passwordEl.focus();
        setTimeout(() => errorEl.classList.remove('show'), 2600);
      }
    });
  </script>
</body>
</html>
